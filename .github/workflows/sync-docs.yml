name: Sync Docs

# Sincroniza DESIGN.md, COMPONENTS.md y README.md con los cambios de codigo.
# Reutilizable en cualquier repo React/TypeScript/Frontend: solo requiere
# el secret ANTHROPIC_API_KEY y el script scripts/sync-docs.py.

on:
  push:
    branches: [main, dev]

concurrency:
  group: sync-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-docs:
    name: Sync documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Necesario para que el script pueda hacer git diff entre commits.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        id: sync
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Rango de commits del push. En el primer push 'before' es 000...,
          # el script cae a HEAD~1 automaticamente.
          BASE_REF: ${{ github.event.before }}
          HEAD_REF: ${{ github.event.after }}
        run: python scripts/sync-docs.py

      - name: Commit changes
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "${{ steps.sync.outputs.commit_message }}"
          git push
